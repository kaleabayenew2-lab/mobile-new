name: find_med
description: A medical Flutter application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  geolocator: ^10.1.1
  geocoding: ^2.2.2
  http: ^1.6.0  # Updated from 0.13.5 to 1.6.0
  hex: ^0.2.0
  flutter_map: ^6.1.0  # Keep this
  latlong2: ^0.9.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/